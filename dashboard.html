<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cocos Capital — Panel interno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00B36B;
      --primary-dark: #009456;
      --primary-light: #E6F7EE;
      --dark: #0F1F1A;
      --sidebar-bg: #0F1F1A;
      --sidebar-text: #D1D5DB;
      --sidebar-active: #00B36B;
      --text: #1F2937;
      --text-muted: #6B7280;
      --text-soft: #9CA3AF;
      --bg: #F7F7F4;
      --card: #FFFFFF;
      --border: #E5E7EB;
      --border-strong: #D1D5DB;
      --danger: #DC2626;
      --danger-light: #FEF2F2;
      --warning: #F59E0B;
      --warning-light: #FEF3C7;
      --success: #10B981;
      --success-light: #D1FAE5;
      --info: #3B82F6;
      --info-light: #DBEAFE;
      --radius: 8px;
      --radius-sm: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      font-size: 14px;
    }

    /* LAYOUTS */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      font-weight: 700;
      font-size: 20px;
      color: var(--dark);
    }
    .logo-mark {
      width: 32px; height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
    }

    .app-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    @media (max-width: 900px) {
      .app-layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .sidebar.open { display: flex; position: fixed; inset: 0; z-index: 100; width: 260px; }
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      padding: 20px 0;
      display: flex;
      flex-direction: column;
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 16px;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
    }
    .sidebar-user {
      padding: 12px 20px;
      margin-bottom: 16px;
    }
    .sidebar-user-name {
      font-size: 13px;
      color: #fff;
      font-weight: 500;
    }
    .sidebar-user-role {
      font-size: 11px;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }
    .nav-section-title {
      padding: 8px 20px;
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-soft);
      letter-spacing: 0.05em;
      margin-top: 8px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      color: var(--sidebar-text);
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: rgba(255,255,255,0.04); }
    .nav-item.active {
      background: rgba(0, 179, 107, 0.12);
      color: #fff;
      border-left-color: var(--sidebar-active);
      font-weight: 500;
    }
    .nav-badge {
      background: rgba(255,255,255,0.15);
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
    }
    .nav-item.active .nav-badge { background: var(--primary); color: #fff; }
    .sidebar-footer {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .logout-btn {
      background: none;
      border: none;
      color: var(--text-soft);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      padding: 6px 0;
    }
    .logout-btn:hover { color: #fff; }

    /* MAIN */
    .main {
      padding: 28px 32px 48px;
      overflow-x: hidden;
    }
    @media (max-width: 600px) { .main { padding: 20px 16px 40px; } }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
      letter-spacing: -0.01em;
    }
    .page-subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 4px;
    }

    /* COMPONENTS */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text);
    }
    .input, .select, .textarea {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input:focus, .select:focus, .textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 179, 107, 0.15);
    }
    .textarea { min-height: 80px; resize: vertical; font-family: inherit; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
    .btn-primary:disabled { background: var(--text-soft); cursor: not-allowed; }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border-strong); }
    .btn-secondary:hover:not(:disabled) { background: var(--bg); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover:not(:disabled) { background: #B91C1C; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-warning:hover:not(:disabled) { background: #D97706; }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-ghost:hover { color: var(--text); background: var(--border); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-block { width: 100%; }

    .alert {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 16px;
      border: 1px solid;
    }
    .alert-info { background: var(--info-light); color: #1E40AF; border-color: #BFDBFE; }
    .alert-warning { background: var(--warning-light); color: #92400E; border-color: #FDE68A; }
    .alert-danger { background: var(--danger-light); color: #991B1B; border-color: #FECACA; }
    .alert-success { background: var(--success-light); color: #065F46; border-color: #A7F3D0; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card + .card { margin-top: 16px; }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* KPI grid */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .kpi-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .kpi-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--dark);
    }

    /* Table */
    .tickets-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .tickets-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .tickets-table td {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
    }
    .tickets-table tr:last-child td { border-bottom: none; }
    .tickets-table tbody tr {
      cursor: pointer;
      transition: background 0.1s;
    }
    .tickets-table tbody tr:hover { background: var(--bg); }
    .tickets-table .ticket-num {
      font-weight: 600;
      color: var(--dark);
    }
    .tickets-table .client-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .tickets-table .client-name { font-weight: 500; }
    .tickets-table .client-email {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Status badge */
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .status-badge.borrador { background: #F3F4F6; color: #4B5563; }
    .status-badge.en_revision { background: var(--info-light); color: #1E40AF; }
    .status-badge.info_pedida { background: var(--warning-light); color: #92400E; }
    .status-badge.aprobada { background: var(--success-light); color: #065F46; }
    .status-badge.en_liquidacion { background: var(--primary-light); color: var(--primary-dark); }
    .status-badge.completada { background: var(--success-light); color: #065F46; font-weight: 700; }
    .status-badge.rechazada { background: var(--danger-light); color: #991B1B; }

    /* Filters bar */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filters .input, .filters .select { flex: 1; min-width: 180px; max-width: 280px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state h3 {
      color: var(--text);
      font-size: 16px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    /* Loader */
    .loader {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loader-dark {
      border: 2px solid var(--border);
      border-top-color: var(--primary);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .page-loader {
      display: flex; align-items: center; justify-content: center;
      padding: 80px 20px;
    }
    .page-loader .loader {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
    }

    /* Detail view */
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 20px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .detail-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
    }
    .detail-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }
    @media (max-width: 900px) {
      .detail-grid { grid-template-columns: 1fr; }
    }

    .info-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 16px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { color: var(--text-muted); }
    .info-row .value { color: var(--text); font-weight: 500; }

    /* Especies table */
    .especies-mini {
      width: 100%;
      font-size: 13px;
    }
    .especies-mini th, .especies-mini td {
      text-align: left;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }
    .especies-mini th {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* Docs list */
    .doc-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      font-size: 13px;
    }
    .doc-item a {
      margin-left: auto;
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
      font-size: 12px;
    }
    .doc-item a:hover { text-decoration: underline; }

    /* Comment thread */
    .comment {
      padding: 12px 14px;
      border-radius: var(--radius);
      margin-bottom: 10px;
      font-size: 13px;
      border: 1px solid var(--border);
      background: var(--bg);
    }
    .comment.internal {
      background: #FFF7E6;
      border-color: #FDE68A;
    }
    .comment-header {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 500;
    }
    .comment-author { color: var(--text); }
    .comment-body { line-height: 1.55; white-space: pre-wrap; }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 24px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 5px; top: 6px; bottom: 6px;
      width: 2px;
      background: var(--border);
    }
    .timeline-event {
      position: relative;
      padding-bottom: 14px;
      font-size: 13px;
    }
    .timeline-event::before {
      content: '';
      position: absolute;
      left: -23px;
      top: 3px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid var(--primary);
    }
    .timeline-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Action buttons */
    .action-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }

    /* Link copy */
    .link-box {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .link-box code {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }
    .modal {
      background: var(--card);
      border-radius: 12px;
      padding: 28px;
      max-width: 460px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--dark);
    }

    a { color: var(--primary); }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: var(--primary-light);
      color: var(--primary-dark);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="app"><div class="page-loader"><div class="loader"></div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // ========================================================================
    // CONFIG — debe coincidir con el de index.html
    // ========================================================================
    const SUPABASE_URL = 'https://mcrtayhyqanxzabskpgf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnRheWh5cWFueHphYnNrcGdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzYxMzgsImV4cCI6MjA5MjI1MjEzOH0.aL4rbPsaxmKXEAlgzPGE4b0h5mK1SaccqOa-PSeDWXU';
    const CLIENT_PORTAL_URL = window.location.origin + '/index.html'; // ajustar si usás dominios separados

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ========================================================================
    // STATE
    // ========================================================================
    let state = {
      view: 'loading', // loading | login | app
      user: null,
      profile: null,
      nav: null, // tab activa
      tickets: [],
      stats: null,
      selectedTicket: null,
      selectedEvents: [],
      selectedComments: [],
      selectedDocs: [],
      filters: { search: '', status: '' },
      loading: false,
      error: '',
      modal: null, // nombre del modal activo
      modalPayload: null
    };

    function setState(patch) {
      state = { ...state, ...patch };
      render();
    }

    // ========================================================================
    // BOOT
    // ========================================================================
    async function boot() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        setState({ view: 'login' });
        return;
      }
      await loadProfile(session.user);
    }

    async function loadProfile(user) {
      const { data: profile, error } = await sb.from('profiles')
        .select('*').eq('id', user.id).single();

      if (error || !profile) {
        setState({
          view: 'login',
          error: 'No encontramos un perfil asociado a este usuario. Contactá al admin.'
        });
        await sb.auth.signOut();
        return;
      }

      if (!profile.active) {
        setState({
          view: 'login',
          error: 'Tu usuario está inactivo. Contactá al admin.'
        });
        await sb.auth.signOut();
        return;
      }

      const defaultNav = defaultNavForRole(profile.role);
      state.user = user;
      state.profile = profile;
      state.nav = defaultNav;
      state.view = 'app';
      render();
      await loadTickets();
    }

    function defaultNavForRole(role) {
      switch (role) {
        case 'comercial': return 'mis-tickets';
        case 'soporte': return 'todos';
        case 'compliance': return 'en-revision';
        case 'titulos': return 'pendientes-titulos';
        case 'admin': return 'todos';
        default: return 'todos';
      }
    }

    // ========================================================================
    // DATA LOADING
    // ========================================================================
    async function loadTickets() {
      setState({ loading: true });
      try {
        let query = sb.from('tickets').select('*').order('created_at', { ascending: false });

        // Por defecto el RLS ya restringe; acá filtramos adicionalmente según tab
        switch (state.nav) {
          case 'en-revision': query = query.eq('status', 'en_revision'); break;
          case 'info-pedida': query = query.in('status', ['info_pedida']); break;
          case 'pendientes-titulos': query = query.eq('status', 'aprobada'); break;
          case 'en-liquidacion': query = query.eq('status', 'en_liquidacion'); break;
          case 'completadas': query = query.eq('status', 'completada'); break;
          case 'rechazadas': query = query.eq('status', 'rechazada'); break;
          default: break; // 'todos' o 'mis-tickets' no filtra (RLS hace lo suyo)
        }

        const { data, error } = await query;
        if (error) throw error;
        setState({ tickets: data || [], loading: false });
      } catch (err) {
        setState({ loading: false, error: err.message });
      }
    }

    async function loadStats() {
      if (state.profile.role !== 'comercial') return;
      const { data } = await sb.from('comercial_stats')
        .select('*').eq('comercial_slug', state.profile.comercial_slug).maybeSingle();
      if (data) setState({ stats: data });
    }

    async function loadTicketDetail(ticketId) {
      setState({ loading: true });
      try {
        const [tRes, evRes, cmRes, docRes] = await Promise.all([
          sb.from('tickets').select('*').eq('id', ticketId).single(),
          sb.from('ticket_events').select('*').eq('ticket_id', ticketId).order('created_at', { ascending: false }),
          sb.from('ticket_comments').select('*').eq('ticket_id', ticketId).order('created_at', { ascending: true }),
          sb.from('ticket_documents').select('*').eq('ticket_id', ticketId).order('uploaded_at', { ascending: true })
        ]);
        if (tRes.error) throw tRes.error;
        setState({
          selectedTicket: tRes.data,
          selectedEvents: evRes.data || [],
          selectedComments: cmRes.data || [],
          selectedDocs: docRes.data || [],
          loading: false
        });
      } catch (err) {
        setState({ loading: false, error: err.message });
      }
    }

    // ========================================================================
    // AUTH
    // ========================================================================
    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) {
        setState({ error: 'Completá mail y password.' });
        return;
      }
      setState({ loading: true, error: '' });
      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        await loadProfile(data.user);
      } catch (err) {
        setState({ loading: false, error: 'Usuario o password incorrectos.' });
      }
    }

    async function logout() {
      await sb.auth.signOut();
      state = {
        view: 'login', user: null, profile: null, nav: null,
        tickets: [], selectedTicket: null, filters: { search: '', status: '' },
        loading: false, error: '', modal: null
      };
      render();
    }

    // ========================================================================
    // ACTIONS (ticket workflow)
    // ========================================================================
    async function actionApprove() {
      const comment = document.getElementById('actionComment')?.value.trim() || '';
      setState({ loading: true });
      try {
        const t = state.selectedTicket;
        await sb.from('tickets').update({
          status: 'aprobada',
          compliance_reviewed_at: new Date().toISOString(),
          compliance_reviewed_by: state.profile.id
        }).eq('id', t.id);
        await sb.from('ticket_events').insert({
          ticket_id: t.id, event_type: 'approved',
          actor_type: 'interno', actor_id: state.profile.id, actor_email: state.profile.email,
          payload: { comment }
        });
        if (comment) {
          await sb.from('ticket_comments').insert({
            ticket_id: t.id, author_type: 'interno', author_id: state.profile.id,
            author_email: state.profile.email, author_name: state.profile.full_name,
            is_internal: false, message: comment
          });
        }
        closeModal();
        await loadTicketDetail(t.id);
      } catch (err) {
        setState({ loading: false, error: err.message });
      }
    }

    async function actionReject() {
      const motivo = document.getElementById('actionComment')?.value.trim() || '';
      if (!motivo) { alert('El motivo de rechazo es obligatorio.'); return; }
      setState({ loading: true });
      try {
        const t = state.selectedTicket;
        await sb.from('tickets').update({
          status: 'rechazada',
          compliance_reviewed_at: new Date().toISOString(),
          compliance_reviewed_by: state.profile.id
        }).eq('id', t.id);
        await sb.from('ticket_events').insert({
          ticket_id: t.id, event_type: 'rejected',
          actor_type: 'interno', actor_id: state.profile.id, actor_email: state.profile.email,
          payload: { motivo }
        });
        await sb.from('ticket_comments').insert({
          ticket_id: t.id, author_type: 'interno', author_id: state.profile.id,
          author_email: state.profile.email, author_name: state.profile.full_name,
          is_internal: false, message: `Motivo de rechazo: ${motivo}`
        });
        closeModal();
        await loadTicketDetail(t.id);
      } catch (err) {
        setState({ loading: false, error: err.message });
      }
    }

    async function actionRequestInfo() {
      const msg = document.getElementById('actionComment')?.value.trim() || '';
      if (!msg) { alert('Escribí qué información necesitás.'); return; }
      setState({ loading: true });
      try {

    async function actionStartLiquidation() {
      setState({ loading: true });
      try {

        await sb.from('tickets').update({
          status: 'en_liquidacion',
          liquidation_started_at: new Date().toISOString(),

        }).eq('id', t.id);
        await sb.from('ticket_events').insert({

        });

    async function actionComplete() {
      const numero = document.getElementById('numeroOperacion')?.value.trim();
      const file = document.getElementById('comprobanteFile')?.files[0];
      if (!numero) { alert('Ingresá el número de operación.'); return; }
      if (!file) { alert('Subí el comprobante.'); return; }

      setState({ loading: true });
      try {
        const t = state.selectedTicket;
        const ext = file.name.split('.').pop();
        const path = `${t.id}/comprobante.${ext}`;
        const { error: upErr } = await sb.storage.from('comprobantes').upload(path, file, { upsert: true });
        if (upErr) throw upErr;

        await sb.from('tickets').update({
          status: 'completada',
          numero_operacion: numero,
          comprobante_path: path,
          completed_at: new Date().toISOString()
        }).eq('id', t.id);

        await sb.from('ticket_events').insert({
          ticket_id: t.id, event_type: 'completed',
          actor_type: 'interno', actor_id: state.profile.id, actor_email: state.profile.email,
          payload: { numero_operacion: numero }
        });

        closeModal();
        await loadTicketDetail(t.id);
      } catch (err) {
        setState({ loading: false, error: err.message });
      }
    }

    async function actionReprocess() {
      const motivo = document.getElementById('actionComment')?.value.trim() || '';
      if (!motivo) { alert('Indicá el motivo del reproceso.'); return; }
      setState({ loading: true });
      try {
        const t = state.selectedTicket;
        await sb.from('tickets').update({ status: 'en_revision' }).eq('id', t.id);
        await sb.from('ticket_events').insert({
          ticket_id: t.id, event_type: 'reprocessed',
          actor_type: 'interno', actor_id: state.profile.id, actor_email: state.profile.email,
          payload: { motivo }
        });
        await sb.from('ticket_comments').insert({
          ticket_id: t.id, author_type: 'interno', author_id: state.profile.id,
          author_email: state.profile.email, author_name: state.profile.full_name,
          is_internal: true, message: `[Reprocess de Títulos] ${motivo}`
        });
        closeModal();
        await loadTicketDetail(t.id);
      } catch (err) {
        setState({ loading: false, error: err.message });
      }
    }

    async function addComment(isInternal) {
      const msg = document.getElementById('newCommentText').value.trim();
      if (!msg) return;
      setState({ loading: true });
      try {
        const t = state.selectedTicket;
        await sb.from('ticket_comments').insert({
          ticket_id: t.id, author_type: 'interno', author_id: state.profile.id,
          author_email: state.profile.email, author_name: state.profile.full_name,
          is_internal: isInternal, message: msg
        });
        await sb.from('ticket_events').insert({
          ticket_id: t.id, event_type: 'comment_added',
          actor_type: 'interno', actor_id: state.profile.id, actor_email: state.profile.email,
          payload: { is_internal: isInternal }

      } catch (err) {
        setState({ loading: false, error: err.message });
      }

    // ========================================================================
    // MODAL HELPERS
    // ========================================================================
    function openModal(name, payload) { setState({ modal: name, modalPayload: payload }); }
    function closeModal() { setState({ modal: null, modalPayload: null }); }

    // ========================================================================
    // RENDER
    // ========================================================================
    function render() {
      const root = document.getElementById('app');
      let html;
      if (state.view === 'loading') html = `<div class="page-loader"><div class="loader"></div></div>`;
      else if (state.view === 'login') html = viewLogin();
      else if (state.view === 'app') html = viewApp();
      root.innerHTML = html;
    }

    // --- LOGIN ---
    function viewLogin() {
      return `
        <div class="login-wrap">
          <div class="login-card">
            <div class="login-logo">
              <div class="logo-mark">C</div>
              <span>Cocos Capital — Interno</span>
            </div>
            <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 14px;">
              Ingresá con tu mail corporativo de Cocos.
            </p>
            ${state.error ? `<div class="alert alert-danger">${escapeHtml(state.error)}</div>` : ''}
            <div class="field">
              <label>Mail corporativo</label>
              <input type="email" id="loginEmail" class="input" autocomplete="email" onkeydown="if(event.key==='Enter') document.getElementById('loginPassword').focus()">
            </div>
            <div class="field">
              <label>Password</label>
              <input type="password" id="loginPassword" class="input" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()">
            </div>
            <button class="btn btn-primary btn-block" onclick="login()" ${state.loading ? 'disabled' : ''}>
              ${state.loading ? '<span class="loader"></span>' : ''} Entrar
            </button>
          </div>
        </div>
      `;
    }

    // --- APP SHELL ---
    function viewApp() {
      return `
        <div class="app-layout">
          ${sidebar()}
          <main class="main">
            ${state.selectedTicket ? viewDetail() : viewList()}
          </main>
        </div>
        ${state.modal ? renderModal() : ''}

    }

    function sidebar() {
      const p = state.profile;
      const roleLabel = {
        comercial: 'Comercial', soporte: 'Soporte', compliance: 'Compliance',
        titulos: 'Títulos', admin: 'Admin'
      }[p.role];

      return `
        <aside class="sidebar">
          <div class="sidebar-logo">
            <div class="logo-mark">C</div>
            <span>Cocos Interno</span>
          </div>

          <div class="sidebar-user">
            <div class="sidebar-user-name">${escapeHtml(p.full_name || p.email)}</div>
            <div class="sidebar-user-role">${roleLabel}${p.comercial_slug ? ` · ${escapeHtml(p.comercial_slug)}` : ''}</div>
          </div>

          ${navForRole(p.role)}

          <div class="sidebar-footer">
            <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
          </div>
        </aside>
      `;
    }

    function navForRole(role) {
      const items = [];
      if (role === 'comercial') {
        items.push({ id: 'mis-tickets', label: 'Mis tickets' });
        items.push({ id: 'mi-link', label: 'Mi link de referidos' });
      } else if (role === 'soporte') {
        items.push({ id: 'todos', label: 'Todos los tickets' });
        items.push({ id: 'generar-link', label: 'Generar link para cliente' });
      } else if (role === 'compliance') {
        items.push({ id: 'en-revision', label: 'En revisión' });
        items.push({ id: 'info-pedida', label: 'Esperando cliente' });
        items.push({ id: 'todos', label: 'Todos los tickets' });
        items.push({ id: 'rechazadas', label: 'Rechazadas' });
      } else if (role === 'titulos') {
        items.push({ id: 'pendientes-titulos', label: 'Pendientes' });
        items.push({ id: 'en-liquidacion', label: 'En liquidación' });
        items.push({ id: 'completadas', label: 'Completadas' });
      } else if (role === 'admin') {
        items.push({ id: 'todos', label: 'Todos los tickets' });
        items.push({ id: 'en-revision', label: 'En revisión' });
        items.push({ id: 'pendientes-titulos', label: 'Pendientes Títulos' });
        items.push({ id: 'completadas', label: 'Completadas' });
        items.push({ id: 'usuarios', label: 'Usuarios' });
      }

      return `<nav>${items.map(i => `
        <div class="nav-item ${state.nav === i.id ? 'active' : ''}" onclick="navTo('${i.id}')">
          <span>${i.label}</span>
        </div>
      `).join('')}</nav>`;
    }

    async function navTo(id) {
      state.nav = id;
      state.selectedTicket = null;
      state.error = '';
      render();
      if (['mis-tickets', 'todos', 'en-revision', 'info-pedida', 'pendientes-titulos',
           'en-liquidacion', 'completadas', 'rechazadas'].includes(id)) {
        await loadTickets();
      }
      if (id === 'mi-link' && state.profile.role === 'comercial') {
        await loadStats();
      }
    }

    // --- LIST VIEWS ---
    function viewList() {
      if (state.nav === 'mi-link') return viewMiLink();
      if (state.nav === 'generar-link') return viewGenerarLink();
      if (state.nav === 'usuarios') return viewUsuarios();
      return viewTicketsList();
    }

    function viewTicketsList() {
      const navLabels = {
        'mis-tickets': 'Mis tickets',
        'todos': 'Todos los tickets',
        'en-revision': 'Tickets en revisión',
        'info-pedida': 'Esperando respuesta del cliente',
        'pendientes-titulos': 'Pendientes de liquidación',
        'en-liquidacion': 'En liquidación',
        'completadas': 'Completadas',
        'rechazadas': 'Rechazadas'
      };

      const filtered = state.tickets.filter(t => {
        if (state.filters.search) {
          const q = state.filters.search.toLowerCase();
          return (t.email_client || '').toLowerCase().includes(q) ||
                 (t.nombre_client || '').toLowerCase().includes(q) ||
                 (t.cuit_client || '').toLowerCase().includes(q) ||
                 String(t.numero).includes(q);
        }
        return true;
      });

      return `
        <div class="page-header">
          <div>
            <h1 class="page-title">${navLabels[state.nav] || 'Tickets'}</h1>
            <p class="page-subtitle">${filtered.length} ${filtered.length === 1 ? 'ticket' : 'tickets'}</p>
          </div>
        </div>

        ${state.error ? `<div class="alert alert-danger">${escapeHtml(state.error)}</div>` : ''}

        <div class="filters">
          <input type="text" class="input" placeholder="Buscar por cliente, CUIT, mail o número..."
                 value="${escapeHtml(state.filters.search)}"
                 oninput="state.filters.search = this.value; render();">
        </div>

        ${state.loading ? `<div class="page-loader"><div class="loader loader-dark"></div></div>` :
          filtered.length === 0 ? `
            <div class="empty-state">
              <h3>Sin tickets en esta vista</h3>
              <p>Todo al día.</p>
            </div>
          ` : `
            <table class="tickets-table">
              <thead>
                <tr>
                  <th>N°</th>
                  <th>Cliente</th>
                  <th>Destino</th>
                  <th>Estado</th>
                  <th>Tipo</th>
                  <th>Fecha</th>
                </tr>
              </thead>
              <tbody>
                ${filtered.map(t => `
                  <tr onclick="openTicket('${t.id}')">
                    <td class="ticket-num">#${t.numero}</td>
                    <td>
                      <div class="client-info">
                        <span class="client-name">${escapeHtml(t.nombre_client || '(sin nombre)')}</span>
                        <span class="client-email">${escapeHtml(t.email_client)}</span>
                      </div>
                    </td>
                    <td>
                      <div class="client-info">
                        <span class="client-name">${escapeHtml(t.alyc_destino_nombre || '—')}</span>
                        <span class="client-email">Cta. ${escapeHtml(t.cuenta_comitente_destino || '—')}</span>
                      </div>
                    </td>
                    <td><span class="status-badge ${t.status}">${statusLabel(t.status)}</span></td>
                    <td>${t.is_same_name ? 'Misma titularidad' : 'Terceros'}</td>
                    <td>${formatDate(t.created_at)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `}
      `;
    }

              ${!t.is_same_name ? `
                <div class="info-row"><span class="label">Titular destino</span><span class="value">${escapeHtml(t.titular_destino_nombre || '—')}</span></div>
                <div class="info-row"><span class="label">CUIT titular</span><span class="value">${escapeHtml(t.titular_destino_cuit || '—')}</span></div>
                <div class="info-row"><span class="label">Motivo</span><span class="value">${escapeHtml(t.motivo || '—')}${t.motivo_detalle ? ' — ' + escapeHtml(t.motivo_detalle) : ''}</span></div>
                <div class="info-row"><span class="label">Relación</span><span class="value">${escapeHtml(t.relacion_destinatario || '—')}</span></div>
              ` : ''}
            </div>

            <div class="card">
              <div class="card-title">Especies a transferir</div>
              <table class="especies-mini">
                <thead><tr><th>Código</th><th>Nombre</th><th>Cantidad</th></tr></thead>
                <tbody>
                  ${(t.especies || []).map(e => `
                    <tr>
                      <td><strong>${escapeHtml(e.codigo)}</strong></td>
                      <td>${escapeHtml(e.nombre)}</td>
                      <td>${escapeHtml(String(e.cantidad))}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>

            <div class="card">
              <div class="card-title">Documentación</div>
              ${t.formulario_pdf_path ? `
                <div class="doc-item">
                  <strong>Formulario firmado (PDF)</strong>
                  <a href="#" onclick="downloadFile('formularios', '${t.formulario_pdf_path}'); return false;">Descargar</a>
                </div>
              ` : ''}
              ${t.firma_storage_path ? `
                <div class="doc-item">
                  <span>Firma (${t.firma_tipo === 'pantalla' ? 'firma digital en pantalla' : 'archivo subido'})</span>
                  <a href="#" onclick="downloadFile('firmas', '${t.firma_storage_path}'); return false;">Ver</a>
                </div>
              ` : ''}
              ${state.selectedDocs.length === 0 && !t.formulario_pdf_path ? `
                <p style="color: var(--text-muted); font-size: 13px;">No hay documentación adjunta.</p>
              ` : ''}
              ${state.selectedDocs.map(d => `
                <div class="doc-item">
                  <span>${escapeHtml(d.nombre_original)}</span>
                  <span style="color: var(--text-muted); font-size: 11px;">${(d.size_bytes / 1024).toFixed(0)} KB</span>
                  <a href="#" onclick="downloadFile('documentos', '${d.storage_path}'); return false;">Descargar</a>
                </div>
              `).join('')}
            </div>

            ${t.status === 'completada' && t.comprobante_path ? `
              <div class="card">
                <div class="card-title">Comprobante de liquidación</div>
                <div class="info-row"><span class="label">Número operación</span><span class="value">${escapeHtml(t.numero_operacion || '—')}</span></div>
                <div class="info-row"><span class="label">Liquidado</span><span class="value">${formatDate(t.completed_at)}</span></div>
                <div class="doc-item" style="margin-top: 10px;">
                  <strong>Comprobante</strong>
                  <a href="#" onclick="downloadFile('comprobantes', '${t.comprobante_path}'); return false;">Descargar</a>
                </div>
              </div>
            ` : ''}

            ${actions.length > 0 ? `
              <div class="card">
                <div class="card-title">Acciones</div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                  ${actions.map(a => `
                    <button class="btn ${a.btn}" onclick="openModal('${a.modal}')">${a.label}</button>
                  `).join('')}
                </div>
              </div>
            ` : ''}
          </div>

          <div>
            <div class="card">
              <div class="card-title">Historial</div>
              <div class="timeline">
                ${state.selectedEvents.length === 0 ? `<p style="color: var(--text-muted); font-size: 13px;">Sin eventos.</p>` : ''}
                ${state.selectedEvents.map(ev => `
                  <div class="timeline-event">
                    <div class="timeline-time">${formatDate(ev.created_at)}</div>
                    <div>${formatEvent(ev)}</div>
                    ${ev.actor_email ? `<div style="font-size: 11px; color: var(--text-muted);">${escapeHtml(ev.actor_email)}</div>` : ''}
                    ${ev.payload?.motivo ? `<div style="font-size: 12px; color: var(--text); margin-top: 4px; font-style: italic;">${escapeHtml(ev.payload.motivo)}</div>` : ''}
                  </div>
                `).join('')}
              </div>
            </div>

            <div class="card">
              <div class="card-title">Comentarios</div>
              ${state.selectedComments.length === 0 ? `<p style="color: var(--text-muted); font-size: 13px;">Sin comentarios.</p>` : ''}
              ${state.selectedComments.map(c => `
                <div class="comment ${c.is_internal ? 'internal' : ''}">
                  <div class="comment-header">
                    <span class="comment-author">
                      ${c.author_type === 'cliente' ? 'Cliente' : escapeHtml(c.author_name || c.author_email)}
                      ${c.is_internal ? ' · (interno)' : ''}
                    </span>
                    <span>${formatDate(c.created_at)}</span>
                  </div>
                  <div class="comment-body">${escapeHtml(c.message)}</div>
                </div>
              `).join('')}

              <div style="margin-top: 12px;">
                <textarea id="newCommentText" class="textarea" placeholder="Escribir comentario..."></textarea>
                <div style="display: flex; gap: 6px; margin-top: 6px;">
                  <button class="btn btn-sm btn-secondary" onclick="addComment(true)">Nota interna</button>
                  ${state.profile.role === 'compliance' || state.profile.role === 'soporte' || state.profile.role === 'admin' ? `
                    <button class="btn btn-sm btn-primary" onclick="addComment(false)">Enviar al cliente</button>
                  ` : ''}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function actionsForStatusAndRole(status, role) {
      const actions = [];
      if (role === 'compliance' || role === 'admin') {
        if (status === 'en_revision' || status === 'info_pedida') {
          actions.push({ label: 'Aprobar', btn: 'btn-primary', modal: 'approve' });
          actions.push({ label: 'Pedir info', btn: 'btn-warning', modal: 'requestInfo' });
          actions.push({ label: 'Rechazar', btn: 'btn-danger', modal: 'reject' });
        }
      }
      if (role === 'titulos' || role === 'admin') {
        if (status === 'aprobada') {
          actions.push({ label: 'Tomar para liquidar', btn: 'btn-primary', modal: 'startLiquidation' });
        }
        if (status === 'en_liquidacion') {
          actions.push({ label: 'Marcar completada', btn: 'btn-primary', modal: 'complete' });
          actions.push({ label: 'Devolver a Compliance', btn: 'btn-secondary', modal: 'reprocess' });
        }
      }
      return actions;
    }

    async function downloadFile(bucket, path) {
      const { data, error } = await sb.storage.from(bucket).createSignedUrl(path, 300);
      if (error) { alert('No se pudo generar el link de descarga.'); return; }
      window.open(data.signedUrl, '_blank');
    }

    // --- MODALS ---
    function renderModal() {
      switch (state.modal) {
        case 'approve': return modalAction('Aprobar solicitud',
          'Comentario opcional para el cliente (se envía junto con el mail de aprobación).',
          'Aprobar', 'actionApprove()', 'btn-primary');
        case 'reject': return modalAction('Rechazar solicitud',
          'Motivo del rechazo (obligatorio; se envía al cliente).',
          'Rechazar', 'actionReject()', 'btn-danger');
        case 'requestInfo': return modalAction('Pedir información adicional',
          'Describí qué información necesitás del cliente (se envía por mail).',
          'Enviar pedido', 'actionRequestInfo()', 'btn-warning');
        case 'startLiquidation': return modalConfirm('Tomar la solicitud para liquidar',
          'Esto marca el ticket como "en liquidación". Luego tenés que ejecutar la transferencia en el core y volver acá para cargar el comprobante.',
          'Tomar', 'actionStartLiquidation()');
        case 'complete': return modalComplete();
        case 'reprocess': return modalAction('Devolver a Compliance',
          'Motivo por el cual volvés el ticket (solo visible internamente).',
          'Devolver', 'actionReprocess()', 'btn-secondary');
        case 'newUser': return modalNewUser();
      }
      return '';
    }

    function modalAction(title, hint, btnLabel, handler, btnClass) {
      return `
        <div class="modal-overlay" onclick="if(event.target === this) closeModal()">
          <div class="modal">
            <h2>${title}</h2>
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 12px;">${hint}</p>
            <textarea id="actionComment" class="textarea" style="min-height: 120px;" autofocus></textarea>
            <div style="display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end;">
              <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
              <button class="btn ${btnClass}" onclick="${handler}" ${state.loading ? 'disabled' : ''}>
                ${state.loading ? '<span class="loader"></span>' : ''} ${btnLabel}
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function modalConfirm(title, msg, btnLabel, handler) {
      return `
        <div class="modal-overlay" onclick="if(event.target === this) closeModal()">
          <div class="modal">
            <h2>${title}</h2>
            <p style="color: var(--text); margin-bottom: 20px;">${msg}</p>
            <div style="display: flex; gap: 8px; justify-content: flex-end;">
              <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
              <button class="btn btn-primary" onclick="${handler}" ${state.loading ? 'disabled' : ''}>
                ${state.loading ? '<span class="loader"></span>' : ''} ${btnLabel}
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function modalComplete() {
      return `
        <div class="modal-overlay" onclick="if(event.target === this) closeModal()">
          <div class="modal">
            <h2>Completar liquidación</h2>
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 16px;">
              Cargá el número de operación y el comprobante generado por el core. Al guardar, el cliente recibe el comprobante por mail.
            </p>
            <div class="field">
              <label>Número de operación</label>
              <input type="text" id="numeroOperacion" class="input" autofocus>
            </div>
            <div class="field">
              <label>Comprobante (PDF o imagen)</label>
              <input type="file" id="comprobanteFile" class="input" accept="image/*,.pdf">
            </div>
            <div style="display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end;">
              <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
              <button class="btn btn-primary" onclick="actionComplete()" ${state.loading ? 'disabled' : ''}>
                ${state.loading ? '<span class="loader"></span>' : ''} Guardar y completar
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function modalNewUser() {
      return `
        <div class="modal-overlay" onclick="if(event.target === this) closeModal()">
          <div class="modal">
            <h2>Nuevo usuario</h2>
            <div class="alert alert-info" style="font-size: 12px;">
              Creá primero el usuario de Auth en Supabase dashboard (Authentication → Users → Add user), después copiá su UUID acá.
            </div>
            <div class="field">
              <label>UUID del usuario de Auth</label>
              <input type="text" id="newUuid" class="input" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
            </div>
            <div class="field">
              <label>Mail</label>
              <input type="email" id="newEmail" class="input">
            </div>
            <div class="field">
              <label>Nombre completo</label>
              <input type="text" id="newName" class="input">
            </div>
            <div class="field">
              <label>Rol</label>
              <select id="newRole" class="select">
                <option value="comercial">Comercial</option>
                <option value="soporte">Soporte</option>
                <option value="compliance">Compliance</option>
                <option value="titulos">Títulos</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="field">
              <label>Slug (solo comerciales)</label>
              <input type="text" id="newSlug" class="input" placeholder="ej: juanperez">
              <p style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">Si no es comercial, dejalo vacío.</p>
            </div>
            <div style="display: flex; gap: 8px; justify-content: flex-end;">
              <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
              <button class="btn btn-primary" onclick="createUser()">Crear perfil</button>
            </div>
          </div>
        </div>
      `;
    }

    async function createUser() {
      const uuid = document.getElementById('newUuid').value.trim();
      const email = document.getElementById('newEmail').value.trim();
      const name = document.getElementById('newName').value.trim();
      const role = document.getElementById('newRole').value;
      const slug = document.getElementById('newSlug').value.trim() || null;

      if (!uuid || !email || !role) { alert('Completá UUID, mail y rol.'); return; }
      if (role === 'comercial' && !slug) { alert('Un comercial necesita un slug.'); return; }

      try {
        const { error } = await sb.from('profiles').insert({
          id: uuid, email, full_name: name, role, comercial_slug: slug, active: true
        });
        if (error) throw error;
        closeModal();
        await loadUsuarios();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // ========================================================================
    // HELPERS
    // ========================================================================
    function escapeHtml(s) {
      if (s === null || s === undefined) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function formatDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleString('es-AR', {
        day: '2-digit', month: '2-digit', year: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });
    }
    function statusLabel(s) {
      return ({
        borrador: 'Borrador', en_revision: 'En revisión', info_pedida: 'Info pedida',
        aprobada: 'Aprobada', en_liquidacion: 'En liquidación',
        completada: 'Completada', rechazada: 'Rechazada'
      })[s] || s;
    }
    function formatEvent(ev) {
      const labels = {
        created: 'Solicitud creada',
        submitted: 'Enviada a Compliance',
        approved: 'Aprobada por Compliance',
        rejected: 'Rechazada por Compliance',
        info_requested: 'Información adicional solicitada',
        info_provided: 'Cliente respondió',
        liquidation_started: 'Tomada por Títulos',
        completed: 'Transferencia completada',
        reprocessed: 'Devuelta para reproceso',
        comment_added: 'Nuevo comentario'
      };
      return labels[ev.event_type] || ev.event_type;
    }

    // Globals
    window.login = login;
    window.logout = logout;
    window.navTo = navTo;
    window.openTicket = openTicket;
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.actionApprove = actionApprove;
    window.actionReject = actionReject;
    window.actionRequestInfo = actionRequestInfo;
    window.actionStartLiquidation = actionStartLiquidation;
    window.actionComplete = actionComplete;
    window.actionReprocess = actionReprocess;
    window.addComment = addComment;
    window.downloadFile = downloadFile;
    window.copyLink = copyLink;
    window.createUser = createUser;
    window.render = render;
    window.state = state;

    boot();
  </script>
</body>
</html>
